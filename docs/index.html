<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Altatech Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable/dist/css/theme-simple.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />

  <style>
    :root {
      /* 核心配色：使用更專業的深藍與科技藍 */
      --theme-color: #5B6CFF;
      --base-font-size: 16px;
      --sidebar-width: 300px;
      
      /* Docsify Themeable 變數優化 */
      --sidebar-background: #ffffff;
      --sidebar-nav-link-color: #455a64;
      --sidebar-nav-link-color--active: #5B6CFF;
      --sidebar-nav-link-font-weight--active: 600;
    }

    /* 整體背景優化 */
    body {
      background-color: #f8faff !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* 側邊欄：增加陰影與層次 */
    .sidebar {
      border-right: 1px solid rgba(0,0,0,0.05) !important;
      box-shadow: 2px 0 10px rgba(0,0,0,0.02);
    }

    /* 讓 Logo 區塊更漂亮 */
    .sidebar .app-name {
      font-size: 1.4rem;
      font-weight: 800;
      padding: 20px 0;
      text-align: left;
      margin-left: 20px;
    }

    /* 內容區塊卡片化：這是美感的關鍵 */
    .markdown-section {
      max-width: 850px !important;
      margin: 30px auto 60px !important;
      background: white;
      padding: 50px 60px !important;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.04);
      line-height: 1.7;
    }

    /* 標題與裝飾 */
    h1 { font-size: 2.4rem; font-weight: 800; margin-bottom: 1.5rem; }
    h2 { 
      font-size: 1.8rem; 
      margin-top: 2.5rem; 
      padding-bottom: 0.5rem; 
      border-bottom: 2px solid #f0f2f5; 
    }
    h3 { margin-top: 2rem; color: #37474f; }

    /* 表格美化：變得很專業 */
    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      margin: 1.5rem 0;
      border: 1px solid #eef2f6;
      border-radius: 8px;
    }
    th {
      background: #f8faff;
      color: #546e7a;
      font-weight: 600;
      padding: 12px 15px;
      border-bottom: 1px solid #eef2f6;
    }
    td { padding: 12px 15px; border-bottom: 1px solid #f4f7f9; }

    /* 代碼塊圓角 */
    pre {
      background: #282c34 !important;
      border-radius: 8px !important;
      padding: 1.2rem !important;
    }
    
    /* 側邊欄跳轉小標題的樣式（H2, H3） */
    .sidebar-nav li > ul {
      font-size: 0.9rem;
      border-left: 1px solid #eee;
      margin-left: 15px;
      padding-left: 5px;
    }
  </style>
</head>

<body>
  <div id="app">載入中...</div>

  <script>
    window.$docsify = {
      name: 'Altatech Docs',
      
      // 1. 強制指定側邊欄檔案，不讓它自己猜
      loadSidebar: 'sidebar.md', 

      autoHeader: true,
      subMaxLevel: 3,
      homepage: 'README.md',

      sidebarCollapse: {
        sidebarDisplayLevel: 2,
      },
      // 圖片縮放
      zoomImage: true,

      // 搜尋功能優化
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜尋文件...',
        noData: '找不到結果',
        depth: 4
      },

      pagination: {
        previousText: '上一章節',
        nextText: '下一章節',
        crossChapter: true,
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-kotlin.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-gradle.min.js"></script>
</body>
</html>
