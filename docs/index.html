<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Altatech Docs</title>

  <!-- 主題 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable/dist/css/theme-simple.css">

  <style>
    :root {
      --theme-color: #5B6CFF;
    }

    body {
      background: #f5f7fb;
    }

    /* Sidebar */
    .sidebar {
      background: #ffffff;
      border-right: 1px solid #eee;
    }

    .sidebar .app-name {
      font-weight: 700;
      font-size: 20px;
      color: #5B6CFF;
    }

    /* Header（自製） */
    .app-name::before {
      content: "AI Leads to Activation";
      display: block;
      font-size: 12px;
      color: #7B61FF;
      margin-bottom: 4px;
    }

    /* 內容卡片 */
    .markdown-section {
      max-width: 900px;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
    }

    /* 標題 */
    h1 {
      font-size: 32px;
      font-weight: 700;
    }

    h2 {
      margin-top: 40px;
      border-left: 4px solid #5B6CFF;
      padding-left: 10px;
    }

    /* 表格 */
    table {
      border-radius: 10px;
      overflow: hidden;
    }

    /* code block */
    pre {
      border-radius: 10px !important;
    }

    /* links */
    a {
      color: #5B6CFF;
    }

  </style>
</head>

<body>
  <div id="app"></div>

  <script>
  window.$docsify = {
  name: 'Altatech Docs',
  repo: '',
  loadSidebar: true, // 載入 _sidebar.md
  subMaxLevel: 3,    // 自動抓取 .md 檔內的 H2, H3 標題顯示在側邊欄
  
  // --- 側邊欄摺疊設定 ---
  sidebarCollapse: {
    sidebarDisplayLevel: 1, // 預設展開第一層
  },

  // --- 搜尋插件設定 ---
  search: {
    maxAge: 86400000,
    paths: 'auto',
    placeholder: '搜尋文件...',
    noData: '找不到結果',
    depth: 6
  },

  // --- 分頁插件 ---
  pagination: {
    previousText: '上一章節',
    nextText: '下一章節',
    crossChapter: true,
    crossChapterText: true,
  },
}
</script>

<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
<script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

</body>
</html>
