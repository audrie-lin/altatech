<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Altatech Docs</title>

  <!-- 主題 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable/dist/css/theme-simple.css">

  <style>
    :root {
      --theme-color: #5B6CFF;
    }

    body {
      background: #f5f7fb;
    }

    /* Sidebar */
    .sidebar {
      background: #ffffff;
      border-right: 1px solid #eee;
    }

    .sidebar .app-name {
      font-weight: 700;
      font-size: 20px;
      color: #5B6CFF;
    }

    /* Header（自製） */
    .app-name::before {
      content: "AI Leads to Activation";
      display: block;
      font-size: 12px;
      color: #7B61FF;
      margin-bottom: 4px;
    }

    /* 內容卡片 */
    .markdown-section {
      max-width: 900px;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
    }

    /* 標題 */
    h1 {
      font-size: 32px;
      font-weight: 700;
    }

    h2 {
      margin-top: 40px;
      border-left: 4px solid #5B6CFF;
      padding-left: 10px;
    }

    /* 表格 */
    table {
      border-radius: 10px;
      overflow: hidden;
    }

    /* code block */
    pre {
      border-radius: 10px !important;
    }

    /* links */
    a {
      color: #5B6CFF;
    }

  </style>
</head>

<body>
  <div id="app"></div>

  <script>
  window.$docsify = {
    name: 'Altatech',
    loadSidebar: true,
    subMaxLevel: 2,

    themeColor: '#5B6CFF',

    search: 'auto',

    pagination: {
      previousText: '上一頁',
      nextText: '下一頁',
    }
  }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

</body>
</html>
