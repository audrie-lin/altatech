openapi: 3.0.3
info:
  title: Altatech Android SDK 數據規範
  version: 1.0.2
  description: |
    本文件定義了 Android 端的 SDK 集成規範與數據上報格式。
    
    ### 快速集成三步驟
    1. **添加依賴**: 引入 `com.bytedance.applog:RangersAppLog-All-global:6.15.3`
    2. **初始化 SDK**: 配置 `AppID` 與數據上報地址。
    3. **自定義事件**: 呼叫 `AppLog.onEventV3` 接口。

tags:
  - name: SDK Configuration
    description: SDK 初始化與全局配置參數
  - name: Preset Properties
    description: SDK 自動採集的預置屬性 (Device/App 資訊)
  - name: Custom Events
    description: 自定義行為事件上報格式

# 這是關鍵：必須定義一個虛擬的路徑，Redoc 才會展開下面的 Schemas
paths:
  /sdk/config:
    get:
      tags:
        - SDK Configuration
      summary: 查看 SDK 配置模型
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SDKInitConfig'
  /sdk/preset:
    get:
      tags:
        - Preset Properties
      summary: 查看預置屬性模型
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AndroidPresetProperties'
  /sdk/events:
    get:
      tags:
        - Custom Events
      summary: 查看自定義事件格式
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomEventV3'

components:
  schemas:
    SDKInitConfig:
      type: object
      title: SDK 初始化參數 (InitConfig)
      required:
        - app_id
        - channel
      properties:
        app_id:
          type: string
          description: "從控制台獲取的唯一 AppID"
          example: "123456"
        channel:
          type: string
          description: "發布管道 (如 GooglePlay, Xiaomi)"
          example: "GooglePlay"
        auto_track_enabled:
          type: boolean
          description: "是否開啟全埋點"
          default: true
        log_enable:
          type: boolean
          description: "是否開啟調試日誌"
          default: false

    AndroidPresetProperties:
      type: object
      title: Android 預置屬性
      description: "SDK 自動採集的設備相關屬性。"
      properties:
        device_model:
          type: string
          description: "設備型號"
          example: "Pixel 7 Pro"
        os_version:
          type: string
          description: "操作系統版本"
          example: "Android 13"
        app_version:
          type: string
          description: "App 的版本號"
          example: "1.0.5"

    CustomEventV3:
      type: object
      title: 自定義事件上報格式
      description: "呼叫 AppLog.onEventV3 時傳入的結構。"
      properties:
        event_name:
          type: string
          description: "事件識別名稱"
          example: "video_play_click"
        params:
          type: object
          description: "事件參數細節"
          properties:
            video_id:
              type: string
              example: "vid_9982"
            play_source:
              type: string
              example: "recommend"
