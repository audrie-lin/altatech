openapi: 3.0.3
info:
  title: Altatech Data Intelligence Model
  version: 1.0.0
  description: |
    本文件定義了 Altatech 的數據模型規範。
    
    ## 核心概念
    * **User ID**: 使用者的唯一識別碼
    * **Event**: 使用者觸發的行為
tags:
  - name: User Profile
    description: 使用者屬性相關定義
  - name: Event Tracking
    description: 行為事件屬性定義

paths: {} # 因為這不是 API 呼叫，只是資料模型，所以 paths 可以留空

components:
  schemas:
    # 這裡開始定義你的資料模型
    UserAttributes:
      type: object
      title: 使用者屬性 (User Attributes)
      description: 描述使用者的靜態特徵。
      properties:
        user_unique_id:
          type: string
          description: "必填。使用者的唯一識別碼。"
          example: "AU12345"
        device_id:
          type: string
          description: "設備唯一識別碼。"
          example: "F8392-D921-002"
        first_login_date:
          type: string
          format: date
          description: "首次登入日期。"
        is_vip:
          type: boolean
          description: "是否為付費會員。"
          
    EventProperties:
      type: object
      title: 事件屬性 (Event Properties)
      description: 埋點事件中所帶的參數。
      properties:
        event_name:
          type: string
          description: "事件名稱，如 `click_button`。"
        page_path:
          type: string
          description: "觸發事件的頁面路徑。"
          example: "/home/dashboard"
        stay_duration:
          type: integer
          description: "停留時長 (秒)。"
