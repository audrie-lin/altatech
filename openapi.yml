info:
  title: Android SDK integration - BytePlus Data Intelligence
  version: 6.17.1
  description: |
    # Document guide
    The following diagram provides an overview of the organization of SDK integration-related documents.
    ![Guide Diagram](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/7e9a02f48a324006988ee048838c816b~tplv-goo7wpa0wc-image.image)

    # Event tracking planning
    Before integrating the SDK, you need to plan event tracking based on your business analysis.

    ## Basic concepts
    | Basic concepts | Concept explanation | Key points for event planning and SDK integration | Detailed guidance document |
    | :--- | :--- | :--- | :--- |
    | **Events, event attributes, common event attributes, user attributes** | User behavior data analysis in BytePlus Analyze is based on an event + user model analysis framework. | You need to plan which events, event attributes, and user attributes to collect and their types according to your business analysis needs during SDK integration. | [Data Model](/docs/data-intelligence/docs-data-model) |
    | **Tracking points, full tracking points, custom tracking points** | Tracking point: The process of embedding event logic into the code through SDK development is called tracking point. | It is usually recommended to plan tracking points by combining the preset events/properties provided by BytePlus Analyze with custom tracking points. | [Tracking, comprehensive tracking](/docs/data-intelligence/Tracking) |

    ## Understand data reporting requirements
    Data reported by the SDK usually follows a fixed format, mainly consisting of two parts: **header** and **event**.

    ### Header Example (JSON)
    ```json
    {
      "magic_tag": "ss_app_log",
      "header": {
        "platform": "Android",
        "sdk_lib": "Android",
        "device_model": "M2012K11AC",
        "device_brand": "Redmi",
        "os_version": "13",
        "sdk_version_name": "6.17.1",
        "channel": "test",
        "user_unique_id": "test_unique_id"
      }
    }
    ```

    # Integrate SDK
    
    ## Step 1: Add SDK dependencies
    
    ### For Gradle below 7.0 (build.gradle)
    ```gradle
    allprojects {
        repositories {
            maven { url '[https://artifact.bytedance.com/repository/Volcengine/](https://artifact.bytedance.com/repository/Volcengine/)' }
        }
    }
    ```

    ### For Gradle 7.0 and above (settings.gradle)
    ```gradle
    dependencyResolutionManagement {
        repositories {
            maven { url = uri("[https://artifact.bytedance.com/repository/Volcengine/](https://artifact.bytedance.com/repository/Volcengine/)") }
        }
    }
    ```

    ### Add Dependency (app-level build.gradle)
    ```gradle
    implementation 'com.bytedance.applog:RangersAppLog-All-global:6.17.1'
    ```

    ## Step 2: Initialize SDK
    ```javascript
    final InitConfig config = new InitConfig("yourAPPID", "yourCHANNEL");
    config.setUriConfig(UriConfig.createByDomain("https://****.****.com", null));
    config.setAutoStart(false);
    config.setAutoTrackEnabled(true);
    config.setLogEnable(false);
    AppLog.setEncryptAndCompress(true);
    AppLog.init(this, config);
    AppLog.start();
    ```

tags:
