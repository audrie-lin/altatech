    description: 完整 API 接口清單

paths:
  /api/onEventV3:
    post:
      tags: [Android SDK API List]
      summary: Report custom events (onEventV3)
      description: |
        According to the tracking plan, if you need to collect and report custom events, you can call the `AppLog.onEventV3` method.
        
        **Example:**
        ```java
        JSONObject paramsObj = new JSONObject();
        paramsObj.put("key_string", "value_string");
        paramsObj.put("key_int", 10);
        AppLog.onEventV3("event", paramsObj);
        ```
      responses:
        '200':
          description: OK

  /api/setUserUniqueID:
    post:
      tags: [Android SDK API List]
      summary: Set custom user (setUserUniqueID)
      description: |
        Set the `user_unique_id` property when user real-name login is required.
        
        **Example:**
        ```java
        AppLog.setUserUniqueID("your_USER_UNIQUE_ID");
        ```
      responses:
        '200':
          description: OK

