openapi: 3.0.3
info:
  title: Altatech Android SDK 數據規範
  description: |
    本文件定義了 Android 端的 SDK 集成規範與數據上報格式。
    
    ## 集成步驟簡述
    1. **添加依賴**: 引入 `RangersAppLog-All-global`。
    2. **初始化 SDK**: 配置 `AppID` 與數據上報地址。
    3. **自定義事件**: 使用 `onEventV3` 接口。
  version: 1.0.2

tags:
  - name: SDK Configuration
    description: SDK 初始化與全局配置參數
  - name: Preset Properties
    description: SDK 自動採集的預置屬性 (Device/App 資訊)
  - name: Custom Events
    description: 自定義行為事件上報格式

paths: {}

components:
  schemas:
    # --- 1. SDK 初始化配置 ---
    SDKInitConfig:
      type: object
      title: SDK 初始化參數 (InitConfig)
      required:
        - app_id
        - channel
      properties:
        app_id:
          type: string
          description: "從控制台獲取的唯一 AppID"
          example: "123456"
        channel:
          type: string
          description: "發布管道 (如 GooglePlay, Xiaomi)"
          example: "GooglePlay"
        auto_track_enabled:
          type: boolean
          description: "是否開啟全埋點 (自動採集點擊、頁面瀏覽)"
          default: true
        log_enable:
          type: boolean
          description: "是否開啟調試日誌 (建議開發環境開啟，生產環境關閉)"
          default: false

    # --- 2. SDK 預置屬性 (自動採集) ---
    AndroidPresetProperties:
      type: object
      title: Android 預置屬性
      description: |
        SDK 會在每次事件上報時自動帶上這些設備相關屬性，不需手動開發。
      properties:
        device_model:
          type: string
          description: "設備型號"
          example: "Pixel 7 Pro"
        os_version:
          type: string
          description: "操作系統版本"
          example: "Android 13"
        app_version:
          type: string
          description: "App 的版本號"
          example: "1.0.5"
        resolution:
          type: string
          description: "螢幕解析度"
          example: "1440x3120"
        language:
          type: string
          description: "系統語言"
          example: "zh-Hant"

    # --- 3. 自定義事件範例 (onEventV3) ---
    CustomEventV3:
      type: object
      title: 自定義事件上報格式
      description: |
        呼叫 `AppLog.onEventV3(eventName, params)` 時傳入的結構。
      required:
        - event_name
      properties:
        event_name:
          type: string
          description: "事件識別名稱"
          example: "video_play_click"
        params:
          type: object
          description: "事件伴隨的自定義參數"
          properties:
            video_id:
              type: string
              example: "vid_9982"
            play_source:
              type: string
              description: "播放來源 (首頁、推薦、收藏)"
              example: "recommend"
            is_auto_play:
              type: boolean
              description: "是否為自動播放"
              example: false
