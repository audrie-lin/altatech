info:
  title: Android SDK integration - BytePlus Data Intelligence
  version: 6.17.1
  description: |
    # Document guide
    The following diagram provides an overview of the organization of SDK integration-related documents.
    ![Guide Diagram](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/7e9a02f48a324006988ee048838c816b~tplv-goo7wpa0wc-image.image)

    # Event tracking planning
    Before integrating the SDK, you need to plan event tracking based on your business analysis.

    ## Basic concepts
    | Basic concepts | Concept explanation | Key points for integration |
    | :--- | :--- | :--- |
    | **Events & Attributes** | User behavior analysis is based on an event + user model. | Plan which events and user attributes to collect. |
    | **Tracking points** | Embedding event logic into code via SDK. | Combine preset events with custom tracking points. |
    | **Full tracking** | Automatic collection of clicks and page views (bav2b_click/page). | No development needed but collects large amounts of data. |

    ## Understand data reporting requirements
    Data reported mainly consists of two parts: **header** and **event**.

    ### Header Example (JSON)
    ```json
    {
      "magic_tag": "ss_app_log",
      "header": {
        "platform": "Android",
        "device_model": "M2012K11AC",
        "os_version": "13",
        "sdk_version_name": "6.17.1",
        "channel": "test",
        "aid": 123456,
        "user_unique_id": "test_unique_id",
        "package": "com.bytedance.test"
      }
    }
    ```

    ## Understand user identification logic
    * **device_id**: Unique device ID, used when real user ID is unavailable.
    * **user_unique_id**: Identifies logged-in users (e.g., account ID).
    * **SSID**: BytePlus's default calculation criteria ID, maps device_id and user_unique_id.

    # Preparation work
    1. **Step 1**: Create tracking point requirements in the management page.
    2. **Step 2**: Obtain **APPID** (Found in Group Settings > Project List).
    3. **Step 3**: Obtain **Reporting Address** (SG environment defaults to Singapore).

    # Integrate SDK
    ## Step 1: Add SDK dependencies
    ```gradle
    // Gradle 7.0+ (settings.gradle)
    dependencyResolutionManagement {
        repositories {
            maven { url = uri("[https://artifact.bytedance.com/repository/Volcengine/](https://artifact.bytedance.com/repository/Volcengine/)") }
        }
    }
    // app/build.gradle
    implementation 'com.bytedance.applog:RangersAppLog-All-global:6.17.1'
    ```

    ## Step 2: Initialize SDK
    ```java
    final InitConfig config = new InitConfig("yourAPPID", "yourCHANNEL");
    config.setUriConfig(UriConfig.createByDomain("[https://your-domain.com](https://your-domain.com)", null));
    config.setAutoStart(false);
    config.setAutoTrackEnabled(true);
    AppLog.init(this, config);
    AppLog.start();
    ```

    # Android SDK API list
    | Category | API | Description |
    | :--- | :--- | :--- |
    | **Main** | `init` / `start` | Initialize and start the SDK. |
    | **Tracking** | `onEventV3` | Report custom behavior events. |
    | **User** | `setUserUniqueID` | Set the logged-in user ID. |
    | **Profile** | `profileSet` | Set user properties (age, gender, etc). |

tags:
  - name: SDK Methods
    description: 常用程式碼接口參考

paths:
  /sdk/onEventV3:
    post:
      tags: [SDK Methods]
      summary: AppLog.onEventV3
      description: |
        Report custom events with attributes.
        ```java
        JSONObject params = new JSONObject();
        params.put("key", "value");
        AppLog.onEventV3("event_name", params);
        ```
      responses:
        '200':
          description: OK
  /sdk/setUserUniqueID:
    post:
      tags: [SDK Methods]
      summary: AppLog.setUserUniqueID
      description: |
        Set user identifier after login.
        ```java
        AppLog.setUserUniqueID("user_id_123");
        ```
      responses:
        '200':
          description: OK

